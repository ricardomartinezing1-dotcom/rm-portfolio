<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ricardo Martínez — Product Designer</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/shell.css" />

<style>
/* ── Design Tokens ─────────────────────────────────────────────────────── */
:root {
  --color-lima:    #B8F300;
  --color-forest:  #2D6A4F;
  --color-dark:    #0F1A10;
  --color-mid:     #3D5A40;
  --color-neutral: #F5F5F0;
  --color-mist:    #EEF3EB;
  --color-sage:    #E2ECDF;
  --color-gray:    #8A9B8E;
  --color-border:  #D6E4D9;
  --color-white:   #FFFFFF;

  /* Surface aliases — semantic layer over base palette */
  --surface-page:     var(--color-neutral); /* default canvas        */
  --surface-mist:     var(--color-mist);    /* hover & alt rows      */
  --surface-sage:     var(--color-sage);    /* nested panels         */
  --surface-card:     var(--color-white);   /* elevated surface      */
  --surface-emphasis: var(--color-forest);  /* inverted section      */

  --font-sans:  'Inter', system-ui, -apple-system, sans-serif;
  --font-serif: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-mono:  'JetBrains Mono', ui-monospace, Menlo, monospace;

  --radius-sm:   4px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 32px; --radius-pill: 999px;
  --shadow-sm: 0 2px 8px rgba(15,26,16,.06);
  --shadow-md: 0 4px 24px rgba(15,26,16,.10);
  --shadow-lg: 0 8px 32px rgba(15,26,16,.12);
  --t-fast: 150ms ease-out; --t-base: 200ms ease-out;

  --max-w: 1200px; --nav-h: 64px; --pad: 80px;
}

/* ── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--color-neutral);
  color: var(--color-dark);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--color-lima); color: var(--color-dark); }
:focus-visible { outline: 2px solid var(--color-lima); outline-offset: 2px; }

/* ── Layout ─────────────────────────────────────────────────────────────── */
.wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--pad); }
@media (max-width: 800px) { .wrap { padding: 0 24px; } }

/* ── Typography ─────────────────────────────────────────────────────────── */
.t-display {
  font-family: var(--font-sans); font-weight: 700;
  font-size: clamp(44px, 6.4vw, 72px);
  letter-spacing: -0.02em; line-height: 1.05; margin: 0;
}
.t-display em, .t-h1 em, .t-h2 em, .t-h3 em {
  font-family: var(--font-serif); font-weight: 300; font-style: italic; letter-spacing: 0;
}
.t-h1 { font: 600 clamp(36px,4.4vw,52px) var(--font-sans); letter-spacing: -0.015em; line-height: 1.1; margin: 0; }
.t-h2 { font: 600 clamp(26px,3vw,32px) var(--font-sans); letter-spacing: -0.01em; line-height: 1.2; margin: 0; }
.t-h3 { font: 600 21px var(--font-sans); line-height: 1.3; margin: 0; }
.t-lead { font: 400 19px var(--font-sans); line-height: 1.65; color: var(--color-mid); margin: 0; }
.t-body { font: 400 16px var(--font-sans); line-height: 1.7; color: var(--color-dark); margin: 0; }
.t-label { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: .1em; color: var(--color-gray); display: inline-block; }
.t-label-dark { color: rgba(245,245,240,.65); }
.on-dark { color: var(--color-white) !important; }
.lead-dark { color: rgba(245,245,240,.82) !important; }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn {
  font: 600 15px var(--font-sans); letter-spacing: .01em;
  border: none; border-radius: var(--radius-pill);
  padding: 14px 28px; display: inline-flex; align-items: center; gap: 8px;
  white-space: nowrap; will-change: transform;
}
.btn-sm { padding: 10px 20px; font-size: 14px; }
.btn-primary { background: var(--color-lima); color: var(--color-dark); }
.btn-dark    { background: var(--color-dark); color: var(--color-white); transition: opacity var(--t-base); }
.btn-dark:hover { opacity: 0.85; }

/* ── Custom cursor dot ───────────────────────────────────────────────────── */
.cursor-dot {
  position: fixed; top: 0; left: 0;
  width: 8px; height: 8px;
  margin: -4px 0 0 -4px;          /* centre on cursor position */
  border-radius: 999px;
  background: var(--color-lima);
  pointer-events: none;
  z-index: 9999;
  will-change: transform;
}
@media (pointer: coarse) { .cursor-dot { display: none; } }
.btn-ghost { background: transparent; color: var(--color-dark); border: 1.5px solid var(--color-dark); padding: 12.5px 26.5px; transition: background var(--t-base), color var(--t-base); }
.btn-ghost.btn-sm { padding: 8.5px 18.5px; }
.btn-ghost:hover { background: var(--color-dark); color: var(--color-white); }

/* ── Link arrow ─────────────────────────────────────────────────────────── */
.la { font: 500 14px var(--font-sans); color: var(--color-mid); display: inline-flex; align-items: center; gap: 8px; }
.la-text { background-image: linear-gradient(var(--color-lima),var(--color-lima)); background-size: 0% 2px; background-repeat: no-repeat; background-position: 0 100%; padding-bottom: 2px; transition: background-size var(--t-base); }
.la:hover .la-text { background-size: 100% 2px; }
.la-icon { display: inline-block; }
.la-lima { color: var(--color-lima); }

/* ── Tag ─────────────────────────────────────────────────────────────────── */
.tag { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: .08em; background: rgba(184,243,0,.15); color: var(--color-mid); border: 1px solid rgba(184,243,0,.4); padding: 4px 10px; border-radius: var(--radius-sm); display: inline-block; }
.tag-dark { background: rgba(255,255,255,.12); color: var(--color-white); border-color: rgba(255,255,255,.2); }
.tags-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; }

/* ── Nav (floating-pill design — pebblelife-inspired) ─────────────────────── */
.nav {
  position: fixed; top: 3rem; left: 0; right: 0;
  z-index: 50;
  display: flex; align-items: stretch; justify-content: space-between;
  padding: 0 3.5rem;
  pointer-events: none;
  transition: top 0.35s ease, padding 0.35s ease;
}
.nav.is-scrolled { top: 16px; padding: 0 24px; }
.nav > * { pointer-events: auto; }

.nav-pill {
  background: var(--color-white);
  border-radius: var(--radius-pill);
  box-shadow:
    0 194px 54px 0 rgba(0,0,0,.00),
    0 124px 50px 0 rgba(0,0,0,.01),
    0  70px 42px 0 rgba(0,0,0,.05),
    0  31px 31px 0 rgba(0,0,0,.09),
    0   8px 17px 0 rgba(0,0,0,.10);
  display: inline-flex; align-items: center;
  padding: 8px;
}

/* Left pill — isologo + name + status dot */
.nav-logo {
  gap: 12px;
  padding: 8px 22px 8px 24px;
  color: var(--color-dark);
  text-decoration: none;
  cursor: pointer;
}
.nav-logo-mark { display: inline-flex; }
.nav-logo-mark svg { display: block; width: 28px; height: 28px; }
.nav-brand-text {
  font: 600 16px var(--font-sans);
  letter-spacing: -0.01em;
  display: inline-flex; align-items: baseline; gap: 4px;
}
.nav-brand-text em {
  font-family: var(--font-serif); font-weight: 300; font-style: italic;
  letter-spacing: 0;
  color: var(--color-mid);
}
.nav-dot {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--color-lima);
  align-self: flex-start; margin-top: 6px;
  flex-shrink: 0;
}

/* Right pill — burger / menu items + CTA */
.nav-menu {
  gap: 4px;
  position: relative;
}
.nav-menu-trigger {
  display: inline-flex; align-items: center;
}
.nav-burger {
  background: transparent; border: none;
  width: 44px; height: 44px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  cursor: pointer;
  padding: 0;
  border-radius: var(--radius-pill);
  transition: opacity 180ms ease, width 380ms cubic-bezier(.6,.05,.3,.95);
  overflow: hidden;
}
.nav-burger span {
  display: block; width: 18px; height: 2px;
  background: var(--color-dark);
  border-radius: 2px;
}
.nav-burger.is-hidden {
  opacity: 0;
  width: 0;
  pointer-events: none;
}

/* Language toggle — twin pill chips inside the right nav pill */
.lang-toggle {
  display: inline-flex; align-items: center;
  background: var(--surface-mist);
  border-radius: var(--radius-pill);
  padding: 3px;
  margin: 0 4px;
  height: 36px;
}
.lang-toggle-btn {
  font: 600 12px var(--font-sans);
  letter-spacing: .04em; text-transform: uppercase;
  background: transparent; border: none;
  color: var(--color-mid);
  padding: 0 14px; height: 30px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: background var(--t-base), color var(--t-base);
}
.lang-toggle-btn.is-active {
  background: var(--color-white);
  color: var(--color-dark);
  box-shadow: 0 1px 2px rgba(0,0,0,.08);
}
.lang-toggle-btn:not(.is-active):hover { color: var(--color-dark); }

/* Items wrap — width is driven by GSAP for cross-browser smoothness */
.nav-items-wrap {
  width: 0;
  overflow: hidden;
  display: flex; align-items: center;
}
.nav-items {
  display: flex; align-items: center; gap: 2px;
  padding: 0 6px;
  white-space: nowrap;
}

.nav-item {
  font: 500 15px var(--font-sans);
  color: var(--color-dark);
  text-decoration: none;
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  transition: background-color 180ms ease;
  display: inline-flex; align-items: center; gap: 8px;
  white-space: nowrap;
  opacity: 0; /* GSAP controls opacity + x */
  will-change: opacity, transform;
}
.nav-item:hover { background: var(--surface-mist); }
.nav-item.is-active { font-weight: 700; background: transparent; }
.nav-item.is-active::before,
.nav-item.is-active::after {
  content: '';
  width: 5px; height: 5px;
  background: var(--color-lima);
  border-radius: 999px;
  display: inline-block;
  flex-shrink: 0;
}

/* CTA — green pill with dark arrow circle */
.nav-cta {
  background: var(--color-lima);
  color: var(--color-dark);
  border: none;
  border-radius: var(--radius-pill);
  padding: 4px 6px 4px 18px;
  display: inline-flex; align-items: center; gap: 12px;
  font: 600 14px var(--font-sans);
  letter-spacing: .005em;
  cursor: pointer;
  white-space: nowrap;
}
.nav-cta-arrow {
  background: var(--color-dark);
  color: var(--color-white);
  width: 36px; height: 36px;
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.nav-cta-arrow svg { display: block; }

/* Mobile: collapse name text, keep logo only */
@media (max-width: 640px) {
  .nav { top: 12px; padding: 0 16px; }
  .nav-brand-text, .nav-dot { display: none; }
  .nav-logo { padding: 6px; }
  .nav-logo-mark svg { width: 32px; height: 32px; }
  .nav-cta-arrow { width: 32px; height: 32px; }
  .nav-items-wrap { display: none; }
}

/* ── Hero ─────────────────────────────────────────────────────────────────── */
/* ── Hero layout ────────────────────────────────────────────────────────── */
/* ── Hero: 100vh, 2 equal rows (image top / content bottom) ─────────────── */
.hero {
  height: 100vh;
  display: grid;
  grid-template-rows: 1fr 1fr;
  position: relative;           /* anchor for absolute tabs */
  /* full viewport width — no max-width here */
}

/* Image — 24px margin top + sides, flush at bottom of its row */
.hero-img {
  margin: 24px 24px 0;
  border-radius: var(--radius-xl); overflow: hidden;
  position: relative;
  background-color: var(--_bg, #BFA98D);
}
.hero-img-media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center center; }

/* Tab selector — inside .hero-img, bottom-centre with 1.5rem padding */
.hero-tabs {
  position: absolute; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.6);
  -webkit-backdrop-filter: blur(2px);
          backdrop-filter: blur(2px);
  border-radius: var(--radius-pill);
  padding: 6px; width: fit-content;
  box-shadow:
    0 194px 54px 0 rgba(0,0,0,.00), 0 124px 50px 0 rgba(0,0,0,.01),
    0  70px 42px 0 rgba(0,0,0,.05), 0  31px 31px 0 rgba(0,0,0,.09),
    0   8px 17px 0 rgba(0,0,0,.10);
}
/* Sliding pill indicator — animated via GSAP on tab change */
.hero-tab-pill {
  position: absolute; top: 6px; bottom: 6px;
  left: 0; width: 0;                     /* JS sets these on mount */
  background: var(--color-dark);
  border-radius: var(--radius-pill);
  pointer-events: none; z-index: 0;
  will-change: transform, width;
}
.hero-tab-btn {
  position: relative; z-index: 1;
  padding: 10px 22px; border-radius: var(--radius-pill); border: none;
  background: transparent; font: 500 14px var(--font-sans);
  color: var(--color-mid); cursor: pointer; white-space: nowrap;
  transition: color var(--t-base), background-color var(--t-base);
}
.hero-tab-btn:not(.active):hover { background-color: rgba(15,26,16,0.1); }
.hero-tab-btn.active { color: var(--color-white); }

/* Content row — centred within its row, with reduced side padding */
.hero-body {
  display: grid; grid-template-columns: 7fr 5fr;
  gap: clamp(40px,6vw,88px); align-items: center;
  max-width: 1440px; width: 100%;
  margin: 0 auto; padding: 0 40px;
  align-self: center;
}
.hero-lead { padding-top: 4px; }

/* Status meta (eyebrow in left col) */
.hero-meta { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: .1em; color: var(--color-gray); display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.hero-status-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--color-lima); box-shadow: 0 0 0 4px rgba(184,243,0,.25); flex-shrink: 0; }

/* Mobile */
@media (max-width: 768px) {
  .hero { height: auto; grid-template-rows: auto auto; }
  .hero-img { margin: 80px 16px 0; }
  .hero-tabs { bottom: 1rem; }
  .hero-body { grid-template-columns: 1fr; gap: 24px; padding: 24px; }
}

/* ── Word-mask reveal (hero h1 + lead paragraph) ─────────────────────────── */
/* padding-bottom + matching negative margin-bottom extends the clip area
   below the line-box so descenders (p, q, g, y…) aren't cropped, without
   shifting surrounding layout. Bump translateY values to 140% so the
   "hidden" state still sits fully below this enlarged clip area.         */
.wm   { display: inline-block; overflow: hidden; vertical-align: bottom; line-height: inherit; padding-bottom: 0.3em; margin-bottom: -0.3em; }
.wm-b { display: block;        overflow: hidden; line-height: inherit;                       padding-bottom: 0.3em; margin-bottom: -0.3em; }
.wi   { display: inline-block; will-change: transform; }

/* ── SplitType text reveal (Values section) ──────────────────────────────── */
.text-reveal { font-kerning: none; }
.text-reveal .line-wrapper { overflow: hidden; line-height: inherit; padding-bottom: 0.3em; margin-bottom: -0.3em; }
.text-reveal .line { will-change: transform; }

/* ── Section ─────────────────────────────────────────────────────────────── */
.section { padding: 80px var(--pad) 96px; max-width: var(--max-w); margin: 0 auto; }
@media (max-width: 800px) { .section { padding: 56px 24px 72px; } }
.section-head { margin-bottom: 48px; }

/* ── Project grid & card ─────────────────────────────────────────────────── */
.proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
@media (max-width: 768px) { .proj-grid { grid-template-columns: 1fr; } }

.card-wrap { perspective: 1000px; }
.card {
  background: var(--color-white); border-radius: var(--radius-lg); padding: 24px;
  box-shadow: var(--shadow-sm); cursor: pointer; display: block;
  will-change: transform;
  transition: box-shadow 250ms ease-out;
}
.card:hover { box-shadow: var(--shadow-lg); }
.card:hover .la-text { background-size: 100% 2px; }
.card:hover .la-icon { transform: translateX(4px); }
.la-icon { transition: transform var(--t-base); display: inline-block; }

.card-thumb { aspect-ratio: 16/9; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: var(--shadow-md); }
.card-thumb-mark { font: 700 clamp(56px,10vw,88px) var(--font-sans); letter-spacing: -0.04em; opacity: .8; }
.card-thumb-name { position: absolute; bottom: 14px; left: 16px; font: 600 11px var(--font-sans); text-transform: uppercase; letter-spacing: .1em; opacity: .65; }
.card-label { margin-bottom: 8px; display: block; }
.card-title { font: 600 21px var(--font-sans); color: var(--color-dark); margin: 0 0 8px; line-height: 1.3; }
.card-desc { font: 400 15px var(--font-sans); color: var(--color-mid); line-height: 1.55; margin: 0 0 16px; }

/* ── About (forest-green block, photo + quote + principles) ──────────────── */
.about {
  color: var(--color-neutral);
  padding: clamp(96px, 14vh, 160px) var(--pad);
  max-width: 1280px;
  margin: 0 auto;
}
@media (max-width: 800px) { .about { padding: 80px 24px; } }

.about-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font: 500 11px var(--font-mono); text-transform: uppercase;
  letter-spacing: .12em;
  color: rgba(245,245,240,.6);
  margin-bottom: clamp(56px, 8vh, 88px);
}
.about-eyebrow::before {
  content: ''; width: 6px; height: 6px; border-radius: 999px;
  background: var(--color-lima);
  display: inline-block;
}

.about-row {
  display: grid;
  grid-template-columns: minmax(0, 7fr) minmax(0, 12fr);
  gap: clamp(40px, 6vw, 88px);
  align-items: start;
}

.about-photo {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 4/5;
  background: rgba(245,245,240,.06);
  box-shadow: 0 16px 48px rgba(0,0,0,.25);
}
.about-photo img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.about-photo-pill {
  position: absolute; bottom: 16px; left: 16px;
  background: var(--color-dark);
  color: var(--color-neutral);
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  font: 500 11px var(--font-mono);
  letter-spacing: .12em;
  text-transform: uppercase;
}

.about-quote {
  font: 700 clamp(30px, 3.6vw, 46px) var(--font-sans);
  letter-spacing: -0.018em;
  line-height: 1.2;
  margin: 0;
  color: var(--color-neutral);
  text-wrap: pretty;
}
.about-quote em {
  font-family: var(--font-serif);
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0;
  /* SplitType bumps <em> to inline-block which makes it an atomic unit
     for line-wrapping — words inside can't be split across lines.
     Force it back to inline so the wrapper can break naturally. */
  display: inline !important;
}

.about-divider {
  border: none;
  border-top: 1px solid rgba(245,245,240,.16);
  margin: clamp(72px, 10vh, 112px) 0 clamp(48px, 6vh, 72px);
}

.about-principles-head {
  display: block;
  margin-bottom: 32px;
  color: rgba(245,245,240,.6);
}

.about-principles-list {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column; gap: 20px;
}
.about-principle {
  display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap;
}
.about-principle-idx {
  font: 500 11px var(--font-mono);
  letter-spacing: .12em;
  color: rgba(245,245,240,.5);
  min-width: 24px;
}
.about-principle-word {
  font: 600 clamp(20px, 2.2vw, 28px) var(--font-sans);
  letter-spacing: -0.01em;
  color: var(--color-neutral);
}
.about-principle-sub {
  font: 500 12px var(--font-mono);
  letter-spacing: .04em;
  color: rgba(245,245,240,.55);
  text-transform: capitalize;
}

.about-paragraphs p {
  font: 400 16px var(--font-sans);
  line-height: 1.65;
  color: rgba(245,245,240,.82);
  max-width: 56ch;
  margin: 0 0 22px;
}
.about-paragraphs p:last-child { margin-bottom: 0; }
.about-paragraphs em {
  font-family: var(--font-serif);
  font-weight: 300;
  font-style: italic;
  color: var(--color-neutral);
}

@media (max-width: 800px) {
  .about-row { grid-template-columns: 1fr; gap: 40px; }
  .about-quote { font-size: clamp(28px, 7vw, 40px); }
  .about-principles-list { gap: 16px; }
}

/* ── Background / Timeline ───────────────────────────────────────────────── */
.bg-section { background: var(--color-white); padding: 96px var(--pad); }
@media (max-width: 800px) { .bg-section { padding: 64px 24px; } }
.bg-inner { max-width: var(--max-w); margin: 0 auto; }
.bg-group { margin-bottom: 64px; }
.bg-group-title { font: 600 11px var(--font-mono); text-transform: uppercase; letter-spacing: .1em; color: var(--color-gray); margin-bottom: 4px; }

.tl-row {
  position: relative;
  display: grid; grid-template-columns: 140px 1fr auto;
  gap: 32px; align-items: flex-start;
  padding: 20px 24px;
  border-top: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--t-base), border-top-color var(--t-base);
}
.tl-row::before {
  content: '';
  position: absolute;
  left: 0; top: 12px; bottom: 12px;
  width: 3px;
  border-radius: var(--radius-pill);
  background: var(--color-lima);
  opacity: 0;
  transition: opacity var(--t-base);
}
.tl-row:hover::before,
.tl-row.is-open::before { opacity: 1; }
.tl-row:hover,
.tl-row.is-open {
  background: var(--surface-mist);
  border-top-color: transparent;
}
@media (max-width: 600px) { .tl-row { grid-template-columns: 1fr auto; padding: 20px 16px; } .tl-year { display: none; } }
.tl-year { font: 500 11px var(--font-mono); color: var(--color-gray); padding-top: 5px; }
.tl-title { font: 600 20px var(--font-sans); color: var(--color-dark); margin: 0 0 2px; }
.tl-org { font-family: var(--font-serif); font-weight: 300; font-style: italic; font-size: 17px; color: var(--color-forest); }
.tl-body { font: 400 15px var(--font-sans); line-height: 1.6; color: var(--color-mid); overflow: hidden; height: 0; opacity: 0; }
.tl-section { margin-top: 18px; }
.tl-section:first-child { margin-top: 4px; }
.tl-section-title { font: 600 13px var(--font-sans); color: var(--color-dark); letter-spacing: -0.005em; margin: 0 0 6px; }
.tl-section-body { margin: 0 0 8px; }
.tl-section-body:last-child { margin-bottom: 0; }
.tl-toggle { width: 32px; height: 32px; border-radius: var(--radius-pill); border: 1px solid var(--color-border); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background var(--t-base), border-color var(--t-base); }
.tl-toggle:hover { background: var(--color-lima); border-color: var(--color-lima); }
.tl-toggle svg { transition: transform .3s ease; }
.tl-toggle.open svg { transform: rotate(45deg); }

/* ── Testimonials ────────────────────────────────────────────────────────── */
.quotes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-top: 40px; }
@media (max-width: 768px) { .quotes-grid { grid-template-columns: 1fr; } }
.quote-text { font-family: var(--font-serif); font-weight: 300; font-style: italic; font-size: clamp(22px,2.6vw,30px); line-height: 1.45; color: var(--color-dark); margin-bottom: 24px; }
.quote-text::before { content: '"'; color: var(--color-lima); font-size: 1.2em; margin-right: 3px; }
.quote-cap { display: flex; align-items: center; gap: 16px; padding-top: 20px; border-top: 1px solid var(--color-border); }
.quote-avatar { width: 44px; height: 44px; border-radius: 999px; background: var(--color-forest); color: var(--color-white); display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-style: italic; font-size: 17px; flex-shrink: 0; }
.quote-name { font: 600 14px var(--font-sans); color: var(--color-dark); }
.quote-role { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: .08em; color: var(--color-gray); margin-top: 2px; }

/* ── Pinned split-screen (Selected work) ─────────────────────────────────── */
/* 5fr content / 1fr gap / 6fr image. Image frame is full-height and touches
   the right edge of the viewport.                                          */
.proj-arch { display: grid; grid-template-columns: 5fr 1fr 6fr; position: relative; width: 100%; }

.proj-left  { grid-column: 1; padding: 0 0 0 var(--pad); }
@media (max-width: 1024px) and (min-width: 769px) {
  .proj-left { padding: 0 0 0 40px; }
}
.proj-panel { height: 150vh; display: flex; align-items: center; }
.proj-panel-content { max-width: 480px; }
.proj-panel-meta { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: .1em; color: var(--color-gray); margin-bottom: 16px; display: block; }
.proj-panel-title { font: 600 clamp(24px,2.8vw,38px) var(--font-sans); letter-spacing: -0.02em; line-height: 1.15; color: var(--color-dark); margin: 0 0 20px; }
.proj-panel-title em { font-family: var(--font-serif); font-weight: 300; font-style: italic; letter-spacing: 0; font-size: 1.05em; color: var(--color-forest); }
/* Dark pill CTA — mirrors .nav-cta shape, dark colourway */
.btn-cta-dark {
  background: var(--color-dark);
  color: var(--color-white);
  border: none;
  border-radius: var(--radius-pill);
  padding: 12px 20px;
  display: inline-flex; align-items: center; gap: 8px;
  font: 600 14px var(--font-sans);
  letter-spacing: .005em;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity var(--t-base);
}
.btn-cta-dark:hover { opacity: 0.8; }
.proj-panel-desc { font: 400 16px var(--font-sans); line-height: 1.65; color: var(--color-mid); margin: 0 0 24px; }

.proj-right { grid-column: 3; height: 100vh; position: relative; align-self: start; }
/* Image: fills the right column edge-to-edge, full viewport height */
/* Default (pre/post pin): 95vh frame centred vertically, right margin +
   rounded corners. Pinned state collapses to full-bleed.                  */
.proj-img-wrap {
  position: absolute;
  top: 2.5vh; bottom: 2.5vh; left: 0; right: 24px;
  border-radius: var(--radius-xl);
  overflow: hidden;
  transition: top .45s ease, bottom .45s ease, right .45s ease, border-radius .45s ease;
}
.proj-right.is-pinned .proj-img-wrap {
  top: 0; bottom: 0; right: 0;
  border-radius: 0;
}
.proj-blinds-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.proj-blinds-svg foreignObject { overflow: hidden; }
.proj-visual { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; position: relative; }
.proj-visual-cover { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; background-repeat: no-repeat; display: block; }
.proj-visual-mark { font: 700 clamp(80px,10vw,160px) var(--font-sans); letter-spacing: -0.04em; opacity: 0.18; line-height: 1; }
.proj-visual-name { font: 600 11px var(--font-mono); text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.5; }

.proj-mobile-grid { display: none; padding: 0 24px 48px; }
@media (max-width: 768px) {
  .proj-arch { display: none; }
  .proj-mobile-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
}

/* ── Side showcase (Things I build for myself) ───────────────────────────── */
.side-showcase {
  width: 100vw; height: 100vh;
  overflow: hidden; position: relative;
  background: var(--color-neutral);
}
/* centered H1 marquee — combined sans + italic serif (display typography) */
.side-mq-wrap {
  position: absolute; top: 50%; left: 0; right: 0;
  transform: translateY(-50%);
  overflow: hidden;
  z-index: 1;
  pointer-events: none;
}
.side-mq {
  display: inline-flex; white-space: nowrap;
  animation: sideMqL 35s linear infinite;
}
@keyframes sideMqL { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.side-mq-item {
  font: 700 clamp(56px, 9vw, 128px) var(--font-sans);
  letter-spacing: -0.02em; line-height: 1;
  color: var(--color-dark);
  padding: 0 0.25em;
  flex-shrink: 0; white-space: nowrap;
  display: inline-flex; align-items: baseline;
}
.side-mq-item em {
  font-family: var(--font-serif);
  font-weight: 300; font-style: italic;
  letter-spacing: 0;
  font-size: 1.05em;
  color: var(--color-forest);
  margin: 0 0.08em;
}
.side-mq-dot { color: var(--color-lima); margin: 0 0.35em; }
/* stage + track */
.side-stage {
  position: absolute; inset: 0;
  overflow: hidden; z-index: 3;
  display: flex; align-items: center; justify-content: flex-start;
}
.side-track {
  display: flex; height: 100%; align-items: center; will-change: transform;
}
.side-slot {
  width: 100vw; height: 100%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.side-card {
  width: 95vw; height: 95vh;
  border-radius: 32px; overflow: hidden;
  position: relative; will-change: transform;
  transform-origin: center center;
}
.side-card-cover {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  background-repeat: no-repeat;
  display: block;
  transition: transform 700ms cubic-bezier(.2,.6,.2,1);
  will-change: transform;
}
.side-card:hover .side-card-cover { transform: scale(1.06); }

/* Custom cursor pill for the shipped-recently cards. Dark glass over a
   backdrop-blur. JS controls position + scale; CSS only paints.            */
.side-card { cursor: none; }
.side-card * { cursor: none; }
.card-cursor {
  position: fixed; top: 0; left: 0;
  padding: 0.5rem 1rem;
  border-radius: 999px;
  background: rgba(15, 26, 16, 0.6);     /* --color-dark @ 60% */
  -webkit-backdrop-filter: blur(8px);
          backdrop-filter: blur(8px);
  color: var(--color-lima);
  line-height: 1.5;
  white-space: nowrap;
  pointer-events: none;
  z-index: 9999;
  will-change: transform;
  display: inline-flex; align-items: baseline; gap: 6px;
}
.card-cursor .cc-read { font: 600 16px var(--font-sans); }
.card-cursor .cc-cs   { font: 300 16px var(--font-serif); font-style: italic; }
@media (max-width: 768px), (pointer: coarse) {
  .card-cursor { display: none; }
  .side-card, .side-card * { cursor: pointer; }
}
.side-visual {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.side-visual-mark {
  font: 700 clamp(80px,12vw,180px) var(--font-sans);
  letter-spacing: -0.04em; opacity: 0.15; line-height: 1;
}
/* overlay */
.side-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: clamp(32px,4vw,56px);
  background: linear-gradient(to top, rgba(0,0,0,.78) 0%, rgba(0,0,0,.25) 45%, transparent 70%);
}
.side-ov-label {
  font: 500 11px var(--font-mono); text-transform: uppercase;
  letter-spacing: .12em; color: rgba(245,245,240,.6);
  margin-bottom: 14px; display: block;
}
.side-ov-title {
  font: 600 clamp(28px,4vw,52px) var(--font-sans);
  letter-spacing: -0.02em; line-height: 1.05;
  color: var(--color-neutral); margin: 0 0 16px;
}
.side-ov-desc {
  font: 400 16px var(--font-sans); line-height: 1.6;
  color: rgba(245,245,240,.8); margin: 0; max-width: 44ch;
}
/* mobile */
@media (max-width: 768px) {
  .side-showcase { height: auto; overflow: visible; padding: 56px 0; }
  .side-mq-wrap { display: none; }
  .side-stage { position: relative; height: auto; overflow: visible; z-index: auto; }
  .side-track { flex-direction: column; gap: 24px; }
  .side-slot { width: calc(100vw - 48px); height: 70vw; margin: 0 24px; }
  .side-card { width: 100%; height: 100%; transform: none !important; }
}

/* ── Smooth scroll wrapper ───────────────────────────────────────────────── */
body { overflow-y: scroll; }
#smooth-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; overflow: hidden; pointer-events: none; }
#smooth-wrapper > #smooth-content { pointer-events: auto; will-change: transform; }

/* ── Side project modal — 90vw / 90vh carousel viewer ───────────────────── */
.sp-modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(45, 106, 79, .55);
  -webkit-backdrop-filter: blur(8px);
          backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 5vh 5vw;
}
.sp-modal-box {
  position: relative;
  width: 90vw; height: 90vh;
  background: var(--surface-page);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  display: grid; grid-template-rows: auto 1fr auto;
  overflow: hidden;
}
.sp-modal-header {
  display: flex; flex-direction: column; gap: 14px;
  padding: 28px 32px 24px;
  border-bottom: 1px solid var(--color-border);
}
.sp-modal-header-top {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.sp-modal-meta {
  font: 500 11px var(--font-mono); text-transform: uppercase;
  letter-spacing: .1em; color: var(--color-gray);
  display: inline-flex; align-items: center; gap: 8px;
}
.sp-modal-dot {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--color-lima);
}
.sp-modal-title { font: 700 28px var(--font-sans); letter-spacing: -0.015em; line-height: 1.2; color: var(--color-dark); margin: 0 0 10px; }
.sp-modal-desc  { font: 400 15px var(--font-sans); line-height: 1.6; color: var(--color-mid); margin: 0; }
.sp-modal-actions { display: inline-flex; align-items: center; gap: 12px; }
.sp-modal-close {
  width: 36px; height: 36px; border-radius: 999px;
  background: transparent; border: 1px solid var(--color-border);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background var(--t-base), border-color var(--t-base);
}
.sp-modal-close:hover { background: var(--surface-mist); border-color: var(--color-dark); }
.sp-modal-close svg { width: 14px; height: 14px; }

.sp-modal-body {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  padding: 0 80px;
  overflow: hidden;
}
.sp-modal-slide {
  position: relative;
  width: 100%; height: 100%;
  background: var(--surface-page);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.sp-modal-slide img,
.sp-modal-slide video { width: 100%; height: 100%; object-fit: contain; display: block; }
.sp-modal-slide canvas { display: block; max-width: 100%; max-height: 100%; }
.sp-modal-iframe { display: block; width: 100%; height: 100%; border: 0; background: transparent; }
.sp-modal-body.is-embed { padding: 0; }
.sp-modal-empty {
  font: 500 12px var(--font-mono); text-transform: uppercase;
  letter-spacing: .15em; color: var(--color-gray);
}
.sp-modal-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 999px;
  background: var(--color-white); border: 1px solid var(--color-border);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 2;
  transition: background var(--t-base), border-color var(--t-base), opacity var(--t-base);
}
.sp-modal-nav:hover:not(:disabled) { background: var(--color-dark); border-color: var(--color-dark); color: var(--color-white); }
.sp-modal-nav:disabled { opacity: .35; cursor: default; }
.sp-modal-nav.prev { left: 20px; }
.sp-modal-nav.next { right: 20px; }
.sp-modal-nav svg { width: 16px; height: 16px; }

.sp-modal-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  border-top: 1px solid var(--color-border);
  font: 500 11px var(--font-mono); text-transform: uppercase;
  letter-spacing: .1em; color: var(--color-gray);
}
.sp-modal-footer .keys { display: inline-flex; align-items: center; gap: 8px; }

@media (max-width: 768px) {
  .sp-modal-overlay { padding: 16px; }
  .sp-modal-box { width: 100%; height: 100%; border-radius: 12px; }
  .sp-modal-header { padding: 20px 20px 16px; }
  .sp-modal-actions { justify-content: flex-end; }
  .sp-modal-body { padding: 20px 16px; }
  .sp-modal-nav { width: 36px; height: 36px; }
  .sp-modal-nav.prev { left: 6px; }
  .sp-modal-nav.next { right: 6px; }
  .sp-modal-footer { padding: 12px 20px; }
}

/* ── Footer ──────────────────────────────────────────────────────────────── */
.footer { background: var(--color-forest); }
.footer-inner { max-width: var(--max-w); margin: 0 auto; padding: 120px var(--pad) 64px; }
@media (max-width: 800px) { .footer-inner { padding: 64px 24px 48px; } }
.footer-cta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-top: 32px; }
.footer-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 40px; margin-top: 80px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,.12); }
.footer-col-label { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: .1em; color: rgba(245,245,240,.55); margin-bottom: 12px; display: block; }
.footer-col-link { font: 400 18px var(--font-sans); color: rgba(245,245,240,.85); display: inline-flex; align-items: center; gap: 8px; transition: color var(--t-base); }
.footer-col-link:hover { color: var(--color-lima); }
.footer-clock { font: 500 16px var(--font-mono); color: var(--color-white); }
.status-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--color-lima); box-shadow: 0 0 0 4px rgba(184,243,0,.2); display: inline-block; }
.footer-bottom { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-top: 80px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,.12); font: 500 13px var(--font-sans); color: rgba(245,245,240,.5); letter-spacing: .04em; }
</style>

const LanguageContext = createContext({ lang: 'en', setLang: () => {} });

function LanguageProvider({ children }) {
  const [lang, setLangState] = useState(() => {
    try { return localStorage.getItem('lang') || 'en'; } catch { return 'en'; }
  });
  const setLang = useCallback((next) => {
    setLangState(next);
    try { localStorage.setItem('lang', next); } catch {}
  }, []);
  return (
    <LanguageContext.Provider value={{ lang, setLang }}>
      {children}
    </LanguageContext.Provider>
  );
}

/* useT() → { t, lang, setLang }
   t('foo.bar.baz') walks the translation tree; falls back to EN, then to the
   raw key if nothing matches.                                              */
function useT() {
  const { lang, setLang } = useContext(LanguageContext);
  const t = useCallback((key) => {
    const walk = (obj) => key.split('.').reduce((o, k) => (o && o[k] != null ? o[k] : null), obj);
    return walk(TRANSLATIONS[lang]) ?? walk(TRANSLATIONS.en) ?? key;
  }, [lang]);
  return { t, lang, setLang };
}

/* ── GSAP setup ──────────────────────────────────────────────────────────── */
gsap.registerPlugin(ScrollTrigger);
gsap.defaults({ ease: 'power2.out' });

/* ── Smooth scroll (native scroll + ticker lerp on content) ─────────────── */
(function initSmoothScroll() {
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReduced) return;

  const content = document.getElementById('smooth-content');
  const LERP = 0.09;
  let currentY = 0;

  // Body height must equal content height so the native scrollbar is correct
  function syncBodyHeight() {
    document.body.style.height = content.scrollHeight + 'px';
  }
  syncBodyHeight();
  document.fonts.ready.then(syncBodyHeight);
  window.addEventListener('resize', syncBodyHeight);
  window._syncBodyHeight = syncBodyHeight;
  window._smoothY = () => currentY;

  // Ticker: lerp currentY → window.scrollY, apply to content
  gsap.ticker.add(() => {
    currentY += (window.scrollY - currentY) * LERP;
    gsap.set(content, { y: -currentY });
    ScrollTrigger.update();              // drive ST from the smoothed position
  });

  gsap.ticker.lagSmoothing(0);

  // Expose API for React anchor navigation
  window.smoothScrollTo = function(y, duration) {
    const obj = { v: window.scrollY };
    gsap.to(obj, {
      v: y,
      duration: duration || 1,
      ease: 'power3.inOut',
      onUpdate() { window.scrollTo(0, obj.v); },
    });
  };
})();

/* ── ScrollTrigger proxy: sync trigger math with smooth-scroll currentY ─── */
/* Without this, pinType:'transform' offsets are calculated with window.scrollY
   but #smooth-content is transformed by currentY (LERP'd), causing jitter.   */
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  ScrollTrigger.scrollerProxy(document.body, {
    scrollTop(value) {
      if (arguments.length) window.scrollTo(0, value);
      return window._smoothY ? window._smoothY() : 0;
    },
    getBoundingClientRect() {
      return { top: 0, left: 0, width: window.innerWidth, height: window.innerHeight };
    },
    pinType: 'transform',
  });
}

function Nav({ active, onNavigate, onCta }) {
  const { t } = useT();
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const navRef     = useRef(null);
  const wrapRef    = useRef(null);
  const itemsRef   = useRef(null);
  const burgerRef  = useRef(null);

  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      gsap.from(navRef.current, { autoAlpha: 0, y: -8, duration: 0.5, delay: 0.8, ease: 'power2.out' });
    });
    return () => ctx.revert();
  }, []);

  /* Collapse nav padding once user scrolls past ~24px */
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 24);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  /* Animate the items wrap width + burger fade in lock-step with menuOpen.
     Measuring scrollWidth each toggle keeps the layout responsive to font
     loads / window resize / language changes. */
  useEffect(() => {
    const wrap   = wrapRef.current;
    const items  = itemsRef.current;
    const burger = burgerRef.current;
    if (!wrap || !items || !burger) return;

    const targetW = menuOpen ? items.scrollWidth : 0;
    gsap.to(wrap, {
      width:    targetW,
      duration: 0.45,
      ease:     'power3.inOut',
      overwrite: true,
    });
    gsap.to(burger, {
      opacity: menuOpen ? 0 : 1,
      width:   menuOpen ? 0  : 44,
      duration: menuOpen ? 0.25 : 0.30,
      ease:    'power2.inOut',
      overwrite: true,
    });
    // Stagger the items themselves
    const itemEls = items.querySelectorAll('.nav-item');
    gsap.to(itemEls, {
      opacity:   menuOpen ? 1 : 0,
      x:         menuOpen ? 0 : 10,
      duration:  0.30,
      ease:      'power2.out',
      stagger:   menuOpen ? 0.04 : { each: 0.02, from: 'end' },
      delay:     menuOpen ? 0.10 : 0,
      overwrite: true,
    });
  }, [menuOpen]);

  const scrollToId = (id) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (window.smoothScrollTo) {
      const content = document.getElementById('smooth-content');
      const offsetTop = el.getBoundingClientRect().top - (content ? content.getBoundingClientRect().top : 0);
      window.smoothScrollTo(offsetTop);
    } else {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  const handleItem = (item) => {
    onNavigate(item.labelKey);
    if (item.type === 'download') return;
    scrollToId(item.target);
    setMenuOpen(false);
  };

  return ReactDOM.createPortal(
    <nav ref={navRef} className={`nav${scrolled ? ' is-scrolled' : ''}`} aria-label="Primary">
      {/* Left pill: isologo + name + status dot */}
      <a className="nav-pill nav-logo" href="#top"
         onClick={e => { e.preventDefault(); scrollToId('top'); }}>
        <span className="nav-logo-mark"><Isologo /></span>
        <span className="nav-brand-text">Ricardo<em>Martínez</em></span>
        <span className="nav-dot" />
      </a>

      {/* Right pill: burger expands into items + CTA. Hover handlers
          are scoped to the burger+items trigger so the CTA never
          opens the menu. */}
      <div className="nav-pill nav-menu">
        <div className="nav-menu-trigger"
             onMouseEnter={() => setMenuOpen(true)}
             onMouseLeave={() => setMenuOpen(false)}>
          <button ref={burgerRef}
                  className="nav-burger"
                  aria-label="Open menu"
                  onClick={() => setMenuOpen(o => !o)}>
            <span /><span />
          </button>
          <div ref={wrapRef} className="nav-items-wrap">
            <div ref={itemsRef} className="nav-items">
              {NAV_ITEMS.map((item, i) => {
                const cls = `nav-item${active === item.labelKey ? ' is-active' : ''}`;
                const style = { '--i': i };
                if (item.type === 'download') {
                  return (
                    <a key={item.labelKey} className={cls} style={style}
                       href={item.href} target="_blank" rel="noopener noreferrer"
                       onClick={() => handleItem(item)}>
                      <span>{t(item.labelKey)}</span>
                    </a>
                  );
                }
                return (
                  <a key={item.labelKey} className={cls} style={style}
                     href={`#${item.target}`}
                     onClick={e => { e.preventDefault(); handleItem(item); }}>
                    <span>{t(item.labelKey)}</span>
                  </a>
                );
              })}
            </div>
          </div>
        </div>
        <LangToggle />
        <a className="nav-cta" href="mailto:ricardomartinezing1@gmail.com">
          <span>{t('nav.cta')}</span>
          <span className="nav-cta-arrow"><ArrowRight /></span>
        </a>
      </div>
    </nav>,
    document.body
  );
}

const HERO_DEFAULT = 1; // "For everyone"

/* Vertical Blinds — SVG mask technique from Hiro-kiii/Scroll-Transition.
   Each blind = 2 SVG <rect>s that start collapsed at the strip's centre-line
   and expand symmetrically outward (left rect shifts left, right rect shifts
   right), revealing the new image through the SVG mask underneath.
   Left→right stagger creates the sequential "venetian blind" open.           */
function runBlindsTransition(container, tab, onSwap) {
  const BLIND_COUNT = 40;
  const svgNS = 'http://www.w3.org/2000/svg';

  const W = container.offsetWidth  || window.innerWidth;
  const H = container.offsetHeight || window.innerHeight * 0.5;

  /* viewBox height = 100 units; width scaled to match aspect ratio */
  const vbH = 100;
  const vbW = (W / H) * 100;
  const blindW = vbW / BLIND_COUNT;   /* width of one strip in viewBox units */

  /* ── SVG overlay (sits on top of existing img) ─────────────────────────── */
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${vbW} ${vbH}`);
  Object.assign(svg.style, {
    position: 'absolute', inset: '0',
    width: '100%', height: '100%',
    zIndex: '5', pointerEvents: 'none',
    overflow: 'hidden',
  });

  /* ── <defs> + <mask> ────────────────────────────────────────────────────── */
  const defs = document.createElementNS(svgNS, 'defs');
  const mask = document.createElementNS(svgNS, 'mask');
  const maskId = `hb-mask-${Date.now()}`;   /* unique id avoids collisions    */
  mask.setAttribute('id', maskId);

  /* Black base = new image is fully hidden until rects open */
  const baseRect = document.createElementNS(svgNS, 'rect');
  baseRect.setAttribute('x', '0'); baseRect.setAttribute('y', '0');
  baseRect.setAttribute('width', vbW); baseRect.setAttribute('height', vbH);
  baseRect.setAttribute('fill', 'black');
  mask.appendChild(baseRect);

  /* ── Build blind pairs ──────────────────────────────────────────────────── */
  const blindPairs = [];   /* { left, right, centerX, halfW } */

  for (let i = 0; i < BLIND_COUNT; i++) {
    const centerX = i * blindW + blindW / 2;
    const halfW   = blindW / 2;

    const rectLeft  = document.createElementNS(svgNS, 'rect');
    const rectRight = document.createElementNS(svgNS, 'rect');

    [rectLeft, rectRight].forEach(r => {
      r.setAttribute('y', '0');
      r.setAttribute('height', String(vbH));
      r.setAttribute('width', '0');          /* collapsed at start            */
      r.setAttribute('fill', 'white');
      r.setAttribute('shape-rendering', 'crispEdges');
      r.setAttribute('x', String(centerX));  /* both start at centre-line     */
    });

    mask.appendChild(rectLeft);
    mask.appendChild(rectRight);
    blindPairs.push({ left: rectLeft, right: rectRight, centerX, halfW });
  }

  defs.appendChild(mask);
  svg.appendChild(defs);

  /* ── New image + bg colour, both masked ────────────────────────────────── */
  const bgRect = document.createElementNS(svgNS, 'rect');
  bgRect.setAttribute('x', '0'); bgRect.setAttribute('y', '0');
  bgRect.setAttribute('width', String(vbW)); bgRect.setAttribute('height', String(vbH));
  bgRect.setAttribute('fill', tab.heroBg);
  bgRect.setAttribute('mask', `url(#${maskId})`);
  svg.appendChild(bgRect);

  /* Mirror the parallax transform of the underlying <img> so there's no
     "snap" when the SVG overlay is removed. Read yPercent via GSAP and
     apply via GSAP — that way SVG user-unit math is handled correctly.   */
  const media = container.querySelector('.hero-img-media');
  let imgEl   = null;
  let syncTransform = null;
  if (tab.image) {
    imgEl = document.createElementNS(svgNS, 'image');
    imgEl.setAttribute('href', tab.image);
    imgEl.setAttribute('x', '0'); imgEl.setAttribute('y', '0');
    imgEl.setAttribute('width', String(vbW)); imgEl.setAttribute('height', String(vbH));
    imgEl.setAttribute('preserveAspectRatio', 'xMidYMid slice');
    imgEl.setAttribute('mask', `url(#${maskId})`);
    svg.appendChild(imgEl);

    if (media) {
      syncTransform = () => {
        const yp = gsap.getProperty(media, 'yPercent');
        gsap.set(imgEl, { scale: 1.35, yPercent: yp, transformOrigin: 'center center' });
      };
      syncTransform();
      gsap.ticker.add(syncTransform);
    }
  }

  container.appendChild(svg);

  /* ── GSAP: open each blind (centre → edges) left-to-right ──────────────── */
  const allRects = blindPairs.flatMap(b => [b.left, b.right]);
  const cleanup  = () => {
    if (syncTransform) gsap.ticker.remove(syncTransform);
    if (svg.parentNode) svg.parentNode.removeChild(svg);
  };

  /* On complete: swap state FIRST, wait two frames for React to commit the
     new <img src> underneath, THEN remove the SVG overlay. This prevents a
     1-frame flash of the OLD image when the overlay is removed too early. */
  const onFinish = () => {
    onSwap();
    requestAnimationFrame(() => requestAnimationFrame(cleanup));
  };

  gsap.to(allRects, {
    attr: {
      x:     (i) => { const b = blindPairs[Math.floor(i / 2)]; return i % 2 === 0 ? b.centerX - b.halfW : b.centerX; },
      width: (i) => { const b = blindPairs[Math.floor(i / 2)]; return b.halfW + 0.05; },
    },
    ease: 'power2.inOut',
    duration: 0.4,
    stagger: { each: 0.010, from: 'start' },
    onComplete:  onFinish,
    onInterrupt: () => { cleanup(); onSwap(); },
  });
}

/* ── Hero ─────────────────────────────────────────────────────────────────── */
function Hero({ onPrimary, onGhost }) {
  const { t } = useT();
  const [activeTab,  setActiveTab]  = useState(HERO_DEFAULT);  /* pill        */
  const [textTab,    setTextTab]    = useState(HERO_DEFAULT);  /* text content */
  const [imgTab,     setImgTab]     = useState(HERO_DEFAULT);  /* <img src>    */
  const sectionRef  = useRef(null);
  const imgRef      = useRef(null);
  const tabsRef     = useRef(null);
  const pillRef     = useRef(null);
  const btnRefs     = useRef([]);
  const isAnimating = useRef(false);

  /* Move pill to the active button. instant=true on first paint (no tween).  */
  const movePill = (idx, instant = false) => {
    const btn  = btnRefs.current[idx];
    const pill = pillRef.current;
    if (!btn || !pill) return;
    const x = btn.offsetLeft;
    const w = btn.offsetWidth;
    if (instant) gsap.set(pill, { x, width: w });
    else         gsap.to (pill, { x, width: w, duration: 0.45, ease: 'power3.out' });
  };

  /* Position pill on mount + on resize */
  useLayoutEffect(() => {
    movePill(activeTab, true);
    const onResize = () => movePill(activeTab, true);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  /* Slide pill whenever activeTab changes */
  useEffect(() => { movePill(activeTab); }, [activeTab]);

  /* ── Parallax on hero image ─────────────────────────────────────────────
     Inner <img> is scaled up so there's room to translate vertically with
     scroll without exposing the frame edges. Tied to ScrollTrigger scrub.  */
  useLayoutEffect(() => {
    const media = imgRef.current && imgRef.current.querySelector('.hero-img-media');
    if (!media) return;
    gsap.set(media, { scale: 1.35, transformOrigin: 'center center' });
    const tween = gsap.fromTo(media,
      { yPercent: 0 },
      {
        yPercent: 18, ease: 'none',
        scrollTrigger: {
          trigger: sectionRef.current,
          start: 'top top',
          end:   'bottom top',
          scrub: 0.6,
        },
      }
    );
    return () => { tween.scrollTrigger && tween.scrollTrigger.kill(); tween.kill(); };
  }, []);

  /* ── Initial entrance ── */
  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      const mm = gsap.matchMedia();
      mm.add('(prefers-reduced-motion: no-preference)', () => {
        const heroWis = gsap.utils.toArray('.hero-wi', sectionRef.current);
        const leadWis = gsap.utils.toArray('.lead-wi', sectionRef.current);
        gsap.set(heroWis, { y: '140%' });
        gsap.set(leadWis, { y: '140%' });
        gsap.set(imgRef.current,   { autoAlpha: 0, y: 16 });
        gsap.set('[data-hi="tabs"]', { autoAlpha: 0, y: 10 });
        gsap.set('[data-hi="meta"]', { autoAlpha: 0, y: 8  });

        const tl = gsap.timeline({ delay: 0.15 });
        tl.to(imgRef.current, { autoAlpha: 1, y: 0, duration: 0.65, ease: 'power3.out' })
          .to(heroWis, { y: '0%', duration: 0.85, stagger: 0.07, ease: 'power3.out' }, '-=0.35')
          .to(leadWis, { y: '0%', duration: 0.6,  stagger: 0.03, ease: 'power3.out' }, '-=0.5')
          .to('[data-hi="tabs"]', { autoAlpha: 1, y: 0, duration: 0.45, ease: 'power2.out' }, '-=0.45')
          .to('[data-hi="meta"]', { autoAlpha: 1, y: 0, duration: 0.4,  ease: 'power2.out' }, '-=0.3');
      });
    }, sectionRef);
    return () => ctx.revert();
  }, []);

  /* ── Tab switch ── Choreographed so text-in overlaps with blinds sweep,
     making the whole transition feel like one event (~1.4s total).         */
  const handleTab = (idx) => {
    if (idx === activeTab || isAnimating.current) return;
    isAnimating.current = true;
    setActiveTab(idx);                            /* pill slides immediately */

    const allWis = gsap.utils.toArray('.hero-wi, .lead-wi', sectionRef.current);

    /* (1) Text exits — snappy, ~0.3s total */
    gsap.to(allWis, {
      y: '140%', duration: 0.28, stagger: 0.008, ease: 'power2.in',
      onComplete: () => {
        /* (3) Swap TEXT only (not img — that swaps when blinds finish).  */
        setTextTab(idx);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          const newHero = gsap.utils.toArray('.hero-wi', sectionRef.current);
          const newLead = gsap.utils.toArray('.lead-wi', sectionRef.current);
          gsap.set([...newHero, ...newLead], { y: '140%' });
          gsap.to(newHero, { y: '0%', duration: 0.6, stagger: 0.045, ease: 'power3.out' });
          gsap.to(newLead, { y: '0%', duration: 0.45, stagger: 0.018, ease: 'power3.out',
            delay: 0.1,
            onComplete: () => { isAnimating.current = false; }
          });
        }));
      },
    });

    /* (2) Blinds in parallel. The underlying <img> only swaps when blinds
       complete — keeps the SVG reveal visually meaningful all the way    */
    runBlindsTransition(imgRef.current, HERO_TABS[idx], () => setImgTab(idx));
  };

  /* Merge static config with localised content */
  const tab     = { ...HERO_TABS[textTab], ...t('hero.' + HERO_TABS[textTab].id), label: t('heroTabs.' + HERO_TABS[textTab].id) };
  const imgRow  = HERO_TABS[imgTab];

  const handleCta = () => {
    if (tab.ctaAction === 'resume') {
      window.open('assets/Ricardo_Martinez_CV.pdf', '_blank', 'noopener,noreferrer');
    } else onGhost && onGhost();
  };

  return (
    <section id="top" ref={sectionRef} className="hero">

      {/* ── Hero image (row 1) + tab selector inside ──────────────────────── */}
      <div ref={imgRef} className="hero-img" style={{ '--_bg': imgRow.heroBg }}>
        {imgRow.image && <img className="hero-img-media" src={imgRow.image} alt={imgRow.id} />}

        <div ref={tabsRef} data-hi="tabs" className="hero-tabs">
          <span ref={pillRef} className="hero-tab-pill" />
          {HERO_TABS.map((tabConf, i) => (
            <button key={tabConf.id}
              ref={el => btnRefs.current[i] = el}
              className={`hero-tab-btn${activeTab === i ? ' active' : ''}`}
              onClick={() => handleTab(i)}>
              {t('heroTabs.' + tabConf.id)}
            </button>
          ))}
        </div>
      </div>

      {/* ── Content (row 2): left col = meta + title / right col = lead + CTA  */}
      <div className="hero-body">
        {/* Left column */}
        <div>
          <div data-hi="meta" className="hero-meta">
            <span className="hero-status-dot" />
            {t('heroMeta')}
          </div>
          <h1 className="t-display" style={{ margin: 0 }}>
            <HeroWords words={tab.titleWords} cls="hero-wi" />
          </h1>
        </div>
        {/* Right column */}
        <div className="hero-lead">
          <p style={{ font: '400 16px var(--font-sans)', lineHeight: 1.65, color: 'var(--color-mid)', margin: '0 0 28px' }}>
            <HeroWords words={tab.bodyWords} cls="lead-wi" />
          </p>
          <button className="btn btn-dark" onClick={handleCta}>{tab.cta}</button>
        </div>
      </div>


    </section>
  );
}

/* ── Project card with 3-D tilt ─────────────────────────────────────────── */
function ProjectCard({ project, onClick }) {
  const wrapRef = useRef(null);
  const cardRef = useRef(null);

  useEffect(() => {
    const wrap = wrapRef.current;
    const card = cardRef.current;
    if (!wrap || !card) return;

    const mm = gsap.matchMedia();
    let xTo, yTo, sTo, cleanupFns = [];

    mm.add('(prefers-reduced-motion: no-preference)', () => {
      xTo = gsap.quickTo(card, 'rotationY', { duration: 0.5, ease: 'power3.out' });
      yTo = gsap.quickTo(card, 'rotationX', { duration: 0.5, ease: 'power3.out' });
      sTo = gsap.quickTo(card, 'scale',     { duration: 0.35, ease: 'power2.out' });

      const onMove = (e) => {
        const r = wrap.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - 0.5;
        const y = (e.clientY - r.top)  / r.height - 0.5;
        xTo(x * 12);
        yTo(-y * 10);
        sTo(1.02);
      };
      const onLeave = () => { xTo(0); yTo(0); sTo(1); };

      wrap.addEventListener('mousemove', onMove);
      wrap.addEventListener('mouseleave', onLeave);
      cleanupFns.push(() => {
        wrap.removeEventListener('mousemove', onMove);
        wrap.removeEventListener('mouseleave', onLeave);
      });
    });

    return () => {
      mm.revert();
      cleanupFns.forEach(fn => fn());
    };
  }, []);

  return (
    <div ref={wrapRef} className="card-wrap gf">
      <div ref={cardRef} className="card" role="button" tabIndex={0}
        onClick={() => onClick && onClick(project)}
        onKeyDown={e => e.key === 'Enter' && onClick && onClick(project)}>
        <div className="card-thumb" style={{ background: project.bg, color: project.fg }}>
          <span className="card-thumb-mark">{project.mark}</span>
          <span className="card-thumb-name">{project.name}</span>
        </div>
        <div>
          <span className="t-label card-label">{project.meta}</span>
          <h3 className="card-title">{project.title}</h3>
          <p className="card-desc">{project.desc}</p>
          <span className="la">
            <span className="la-text">{project.cta || 'Read case study'}</span>
            <ArrowRight />
          </span>
        </div>
      </div>
    </div>
  );
}

function WorkSection({ onOpen }) {
  const { t } = useT();
  const archRef = useRef(null);

  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      const mm = gsap.matchMedia();
      mm.add('(min-width: 769px) and (prefers-reduced-motion: no-preference)', () => {
        const right    = archRef.current.querySelector('.proj-right');
        const imgWraps = gsap.utils.toArray('.proj-img-wrap', archRef.current);

        /* Stack: LATER wraps sit ON TOP. As you scroll forward, the next
           layer's blinds open and cover the previous one.                */
        imgWraps.forEach((wrap, i) => {
          gsap.set(wrap, { zIndex: i + 1 });
        });

        /* Build horizontal-blinds rects for each wrap (30 strips × 2 rects).
           First wrap starts fully open (image visible); others start closed
           (height=0 at strip centre — mask black → foreignObject transparent
           → layer below shows through).                                   */
        const SVG_NS     = 'http://www.w3.org/2000/svg';
        const BLIND_N    = 30;
        const VB         = 100;
        const STRIP_H    = VB / BLIND_N;
        const HALF_H     = STRIP_H / 2;

        const blindSets = imgWraps.map((wrap) => {
          const g = wrap.querySelector('.blinds-g');
          g.innerHTML = '';
          const arr = [];
          for (let k = 0; k < BLIND_N; k++) {
            const centerY = (k + 0.5) * STRIP_H;
            const top = document.createElementNS(SVG_NS, 'rect');
            const bot = document.createElementNS(SVG_NS, 'rect');
            [top, bot].forEach((r) => {
              r.setAttribute('x', '0');
              r.setAttribute('width', String(VB));
              r.setAttribute('height', '0');
              r.setAttribute('fill', 'white');
              r.setAttribute('shape-rendering', 'crispEdges');
              r.setAttribute('y', String(centerY));
            });
            g.appendChild(top);
            g.appendChild(bot);
            arr.push({ top, bot, y: centerY, h: HALF_H });
          }
          return arr;
        });

        /* First wrap: open immediately so the first project is fully visible. */
        const openBlind = (b) => {
          b.top.setAttribute('y',      String(b.y - b.h));
          b.top.setAttribute('height', String(b.h + 0.01));
          b.bot.setAttribute('y',      String(b.y));
          b.bot.setAttribute('height', String(b.h + 0.01));
        };
        blindSets[0].forEach(openBlind);

        /* Manual ticker-based pin — reads the smooth scroll's own currentY so the
           right column transform always cancels the parent lerp exactly.
           This eliminates the bounce caused by window.scrollY vs lerped currentY. */
        const vh = window.innerHeight;

        /* Stable DOM offset: walk offsetParent chain once */
        const getArchTop = () => {
          let top = 0, el = archRef.current;
          while (el) { top += el.offsetTop; el = el.offsetParent; }
          return top;
        };
        let archTop    = getArchTop();
        let archHeight = archRef.current.offsetHeight;

        const onResize = () => {
          archTop    = getArchTop();
          archHeight = archRef.current.offsetHeight;
          if (window._syncBodyHeight) window._syncBodyHeight();
        };
        window.addEventListener('resize', onResize);
        document.fonts.ready.then(onResize);

        const tick = () => {
          const cy   = window._smoothY ? window._smoothY() : window.scrollY;
          const pinY = Math.max(0, Math.min(cy - archTop, archHeight - vh));
          gsap.set(right, { y: pinY, force3D: true });
        };
        gsap.ticker.add(tick);

        /* Toggle .is-pinned on .proj-right while the section is locked in
           place. Out of this range the frame relaxes to 95vh + margin +
           rounded corners (CSS transition handles the morph).             */
        const pinST = ScrollTrigger.create({
          trigger: archRef.current,
          start:   'top top',
          end:     'bottom bottom',
          onEnter:      () => right.classList.add('is-pinned'),
          onLeave:      () => right.classList.remove('is-pinned'),
          onEnterBack:  () => right.classList.add('is-pinned'),
          onLeaveBack:  () => right.classList.remove('is-pinned'),
        });

        /* Per-panel trigger: as the user scrolls from "next panel top
           reaches bottom of viewport" → "next panel top reaches top of
           viewport", that wrap's blinds open progressively, covering the
           previous layer. Stagger spreads the open across the scroll.    */
        const panels = gsap.utils.toArray('.proj-panel', archRef.current);
        for (let i = 1; i < imgWraps.length; i++) {
          const blinds = blindSets[i];
          const rects  = blinds.flatMap(b => [b.top, b.bot]);
          gsap.to(rects, {
            attr: {
              y:      (idx) => { const b = blinds[Math.floor(idx / 2)]; return idx % 2 === 0 ? b.y - b.h : b.y; },
              height: (idx) => { const b = blinds[Math.floor(idx / 2)]; return b.h + 0.01; },
            },
            ease: 'none',
            stagger: { each: 0.02, from: 'end' },
            scrollTrigger: {
              trigger: panels[i],
              start:   'top bottom',
              end:     'top top',
              scrub:   1,
            },
          });
        }


        if (window._syncBodyHeight) window._syncBodyHeight();

        /* Return cleanup for ticker + resize listener */
        return () => {
          gsap.ticker.remove(tick);
          window.removeEventListener('resize', onResize);
          gsap.set(right, { clearProps: 'transform' });
        };
      });
    }, archRef);
    return () => ctx.revert();
  }, []);

  return (
    <>
      {/* ── Section header ────────────────────────────────────────────────── */}
      <section id="side" style={{ padding: '160px var(--pad) 48px', maxWidth: 'var(--max-w)', margin: '0 auto' }}>
        <div className="section-head gf">
          <span className="t-label" style={{ marginBottom: 12, display: 'block' }}>{t('sideSectionEyebrow')}</span>
          <h2 className="t-display">{t('sideSectionTitle')} <em style={{ color: 'var(--color-forest)' }}>{t('sideSectionTitleEm')}</em></h2>
        </div>
      </section>

      {/* ── Desktop: pinned split-screen ──────────────────────────────────── */}
      <div ref={archRef} className="proj-arch">

        {/* Left: info panels, one per project (each 100vh) */}
        <div className="proj-left">
          {SIDE_PROJECTS.map((p) => {
            const i18n = t('sideProjects.' + p.id) || {};
            return (
            <div key={p.id} className="proj-panel">
              <div className="proj-panel-content gf">
                <span className="proj-panel-meta">{i18n.meta || p.meta}</span>
                <h3 className="proj-panel-title">
                  {i18n.keyword && <><em>{i18n.keyword}</em>{' '}</>}{i18n.title || p.title}
                </h3>
                <p className="proj-panel-desc">{i18n.desc || p.desc}</p>
                <div className="tags-row" style={{ marginTop: 0 }}>
                  {(i18n.tags || p.tags || []).map(tag => <span key={tag} className="tag">{tag}</span>)}
                </div>
                <div style={{ marginTop: 28 }}>
                  <button
                    className="btn-cta-dark"
                    onClick={() => onOpen && onOpen(p)}>
                    {i18n.cta || p.cta || 'Read story'} <ArrowRight />
                  </button>
                </div>
              </div>
            </div>
          );})}
        </div>

        {/* Right: stacked visuals, pinned by ScrollTrigger. Each layer's
            image is wrapped in an SVG with a horizontal-blinds mask. JS
            populates the rects + animates them on scroll.                 */}
        <div className="proj-right">
          {SIDE_PROJECTS.map((p, i) => (
            <div key={p.id} className="proj-img-wrap" data-i={i}>
              <svg className="proj-blinds-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <defs>
                  <mask id={`pb-${p.id}`}>
                    <rect x="0" y="0" width="100" height="100" fill="black" />
                    <g className="blinds-g" />
                  </mask>
                </defs>
                <foreignObject x="0" y="0" width="100" height="100" mask={`url(#pb-${p.id})`}>
                  <ProjImage project={p} />
                </foreignObject>
              </svg>
            </div>
          ))}
        </div>
      </div>

      {/* ── Mobile fallback: regular card grid ────────────────────────────── */}
      <div className="proj-mobile-grid">
        {SIDE_PROJECTS.map(p => <ProjectCard key={p.id} project={p} onClick={onOpen} />)}
      </div>

    </>
  );
}

function SideShowcaseSection() {
  const { t } = useT();
  const showcaseRef = useRef(null);
  const trackRef    = useRef(null);
  const cursorRef   = useRef(null);
  const INITIAL_SCALE = 0.35;
  const MARQUEE_REPS  = 10;

  /* Custom lime cursor — appears over .side-card hovers. Hover state is
     derived from elementFromPoint, polled every ticker frame, so the
     cards' CSS transforms (scale + horizontal track movement + smooth
     scroll translateY) don't confuse the detection. */
  useEffect(() => {
    if (window.matchMedia('(max-width: 768px), (pointer: coarse)').matches) return;
    const cursor = cursorRef.current;
    if (!cursor) return;

    const xTo = gsap.quickTo(cursor, 'x', { duration: 0.25, ease: 'power3.out' });
    const yTo = gsap.quickTo(cursor, 'y', { duration: 0.25, ease: 'power3.out' });
    gsap.set(cursor, { xPercent: -50, yPercent: -50, scale: 0 });

    let lastX = -1, lastY = -1, active = false;

    const setActive = (next) => {
      if (next === active) return;
      active = next;
      gsap.to(cursor, {
        scale:    next ? 1 : 0,
        duration: next ? 0.30 : 0.20,
        ease:     next ? 'back.out(1.7)' : 'power2.in',
        overwrite: 'auto',  // only kills conflicting `scale` tweens —
                            // leaves the quickTo x/y tweens alone so the
                            // cursor keeps tracking the mouse
      });
    };

    const checkHover = () => {
      if (lastX < 0) return;
      const el = document.elementFromPoint(lastX, lastY);
      setActive(!!el?.closest('.side-card'));
    };

    const onMove = (e) => {
      lastX = e.clientX; lastY = e.clientY;
      xTo(lastX); yTo(lastY);
      checkHover();
    };

    gsap.ticker.add(checkHover);
    window.addEventListener('mousemove', onMove);

    return () => {
      gsap.ticker.remove(checkHover);
      window.removeEventListener('mousemove', onMove);
    };
  }, []);

  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      const mm = gsap.matchMedia();
      mm.add('(min-width: 769px) and (prefers-reduced-motion: no-preference)', () => {
        const vh = window.innerHeight;
        const vw = window.innerWidth;
        const scaleH = vh;
        const horizH = (SELECTED_PROJECTS.length - 1) * vw;
        const totalScroll = scaleH + horizH;

        const cards    = gsap.utils.toArray('.side-card',    showcaseRef.current);
        const overlays = gsap.utils.toArray('.side-overlay', showcaseRef.current);

        gsap.set(cards[0], { scale: INITIAL_SCALE });
        gsap.set(overlays, { autoAlpha: 0 });

        // Title liquid-fill clip + description word-stagger setup
        const titles = gsap.utils.toArray('.sc-title', showcaseRef.current);
        const descs  = gsap.utils.toArray('.sc-desc',  showcaseRef.current);

        gsap.set(titles, { clipPath: 'inset(100% 0 0 0)' });

        const descSplits = descs.map(el => new SplitType(el, { types: 'words' }));
        descSplits.forEach(s => gsap.set(s.words, { opacity: 0, y: 15 }));

        const tl = gsap.timeline();

        // Phase 1 – scale card 0 up to fill screen
        tl.to(cards[0], { scale: 1, ease: 'power2.inOut', duration: scaleH }, 0);

        // Overlay 0 fade-in at 75% of scale phase
        tl.to(overlays[0], { autoAlpha: 1, duration: scaleH * 0.08 }, scaleH * 0.72);

        // Title liquid fill (card 0)
        tl.to(titles[0], {
          clipPath: 'inset(0% 0 0 0)',
          ease: 'power2.out',
          duration: scaleH * 0.18,
        }, scaleH * 0.78);

        // Description word stagger (card 0)
        if (descSplits[0]?.words?.length) {
          tl.to(descSplits[0].words, {
            opacity: 1, y: 0,
            ease: 'power2.out',
            stagger: scaleH * 0.006,
            duration: scaleH * 0.08,
          }, scaleH * 0.86);
        }

        // Phase 2 – horizontal scroll through remaining cards
        if (horizH > 0) {
          tl.to(trackRef.current, { x: -horizH, ease: 'none', duration: horizH }, scaleH);

          SELECTED_PROJECTS.forEach((_, i) => {
            if (i === 0) return;
            const perCard   = horizH / (SELECTED_PROJECTS.length - 1);
            const cardStart = scaleH + (i - 1) * perCard;

            tl.to(overlays[i], { autoAlpha: 1, duration: perCard * 0.08 }, cardStart + perCard * 0.55);

            tl.to(titles[i], {
              clipPath: 'inset(0% 0 0 0)',
              ease: 'power2.out',
              duration: perCard * 0.18,
            }, cardStart + perCard * 0.62);

            if (descSplits[i]?.words?.length) {
              tl.to(descSplits[i].words, {
                opacity: 1, y: 0,
                ease: 'power2.out',
                stagger: perCard * 0.006,
                duration: perCard * 0.08,
              }, cardStart + perCard * 0.72);
            }
          });
        }

        ScrollTrigger.create({
          trigger:   showcaseRef.current,
          start:     'top top',
          end:       `+=${totalScroll}`,
          scrub:     1,
          pin:       true,
          pinType:   'transform',
          animation: tl,
          invalidateOnRefresh: true,
          onRefresh: () => { if (window._syncBodyHeight) window._syncBodyHeight(); },
        });

        ScrollTrigger.refresh();
        requestAnimationFrame(() => { if (window._syncBodyHeight) window._syncBodyHeight(); });
      });
    }, showcaseRef);
    return () => ctx.revert();
  }, []);

  const marqItems = Array.from({ length: MARQUEE_REPS }, (_, i) => (
    <span key={i} className="side-mq-item">
      {t('workMarquee')} <em>{t('workMarqueeEm')}</em>
      <span className="side-mq-dot" aria-hidden="true">·</span>
    </span>
  ));

  return (
    <section id="work" ref={showcaseRef} className="side-showcase" aria-label={`${t('workMarquee')} ${t('workMarqueeEm')}`}>
      {/* Custom hover cursor — portalled to body to escape #smooth-content's
          transform so position:fixed stays viewport-locked */}
      {ReactDOM.createPortal(
        <div ref={cursorRef} className="card-cursor" aria-hidden="true">
          <span className="cc-read">{t('workCursor.read')}</span>
          <span className="cc-cs">{t('workCursor.caseStudy')}</span>
        </div>,
        document.body
      )}

      {/* Centered display H1 marquee — sits behind card */}
      <div className="side-mq-wrap">
        <div className="side-mq">{marqItems}{marqItems}</div>
      </div>

      {/* Card stage — centered on top of marquee */}
      <div className="side-stage">
        <div ref={trackRef} className="side-track">
          {SELECTED_PROJECTS.map((p) => {
            const Card = p.caseStudyHref ? 'a' : 'div';
            const cardProps = p.caseStudyHref ? { href: p.caseStudyHref } : {};
            return (
              <div key={p.id} className="side-slot">
                <Card className="side-card" style={{ background: p.bg }} {...cardProps}>
                  {p.cover ? (
                    <img className="side-card-cover" src={p.cover} alt={p.name} />
                  ) : (
                    <div className="side-visual" style={{ color: p.fg }}>
                      <span className="side-visual-mark">{p.mark}</span>
                    </div>
                  )}
                  <div className="side-overlay">
                    <span className="side-ov-label">{p.meta}</span>
                    <h3 className="side-ov-title sc-title">{p.name}</h3>
                    <p className="side-ov-desc sc-desc">{p.desc}</p>
                  </div>
                </Card>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

function AboutSection() {
  const { t: tt } = useT();
  const ref = useRef(null);

  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      const mm = gsap.matchMedia();
      mm.add('(prefers-reduced-motion: no-preference)', () => {
        /* Body background → forest when the section enters, back to neutral
           when it leaves. Callback-based so it cooperates with the side
           projects bg zones (which switch back to neutral just before this
           section starts) without scroll-position overlap conflicts. */
        const cssRoot = getComputedStyle(document.documentElement);
        const COL = {
          neutral: cssRoot.getPropertyValue('--surface-page').trim()     || '#F5F5F0',
          forest:  cssRoot.getPropertyValue('--surface-emphasis').trim() || '#2D6A4F',
        };
        const toBg = (c) => gsap.to(document.body, {
          backgroundColor: c, duration: 0.55, ease: 'power2.inOut', overwrite: 'auto',
        });
        // Section enters → forest. Fires later than WorkSection's "neutral
        // handoff" (arch bottom 90%) so the two never race on the same frame.
        ScrollTrigger.create({
          trigger: ref.current,
          start:   'top 50%',
          onEnter:     () => toBg(COL.forest),
          onLeaveBack: () => toBg(COL.neutral),
        });
        // Section leaving → neutral
        ScrollTrigger.create({
          trigger: ref.current,
          start:   'bottom 60%',
          onEnter:     () => toBg(COL.neutral),
          onLeaveBack: () => toBg(COL.forest),
        });

        /* Word-by-word colour reveal on the H1 quote — words start faded and
           light up to full neutral as the user scrolls the quote past viewport
           center. */
        const quote = ref.current.querySelector('.about-quote');
        if (quote) {

            color: FULL,
            stagger: 0.1,
            ease: 'none',
            scrollTrigger: {
              trigger: quote,
              start:   'top center',
              end:     'bottom center',
              scrub:   true,
            },
          });
        }
      });
    }, ref);
    return () => ctx.revert();
  }, []);

  return (
    <section id="about" ref={ref} className="about">
