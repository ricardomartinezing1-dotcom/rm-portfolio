/* ── Timeline row with GSAP accordion ───────────────────────────────────── */
function TimelineRow({ year, title, org, text, sections, defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  const bodyRef = useRef(null);
  const isFirst = useRef(true);

  useLayoutEffect(() => {
    const el = bodyRef.current;
    if (!el) return;
    if (!defaultOpen) gsap.set(el, { height: 0, autoAlpha: 0 });
  }, []);

  useEffect(() => {
    if (isFirst.current) { isFirst.current = false; return; }
    const el = bodyRef.current;
    if (!el) return;
    const mm = gsap.matchMedia();
    mm.add('(prefers-reduced-motion: no-preference)', () => {
      if (open) {
        gsap.to(el, { height: 'auto', autoAlpha: 1, duration: 0.45, ease: 'power2.out', marginTop: 10 });
      } else {
        gsap.to(el, { height: 0, autoAlpha: 0, duration: 0.32, ease: 'power2.inOut', marginTop: 0 });
      }
    });
    mm.add('(prefers-reduced-motion: reduce)', () => {
      gsap.set(el, open ? { height: 'auto', autoAlpha: 1, marginTop: 10 } : { height: 0, autoAlpha: 0, marginTop: 0 });
    });
    return () => mm.revert();
  }, [open]);

  return (
    <div className={`tl-row${open ? ' is-open' : ''}`} onClick={() => setOpen(o => !o)}>
      <span className="tl-year">{year}</span>
      <div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, flexWrap: 'wrap' }}>
          <p className="tl-title">{title}</p>
          <span className="tl-org">{org}</span>
        </div>
        <div ref={bodyRef} className="tl-body">
          {sections
            ? sections.map((s, idx) => (
                <div key={idx} className="tl-section">
                  <p className="tl-section-title">{s.title}</p>
                  {s.body.split('\n\n').map((para, j) => (
                    <p key={j} className="tl-section-body">{para}</p>
                  ))}
                </div>
              ))
            : <p style={{ margin: 0, paddingBottom: 4 }}>{text}</p>}
        </div>
      </div>
      <button className={`tl-toggle${open ? ' open' : ''}`} aria-label="Toggle" onClick={e => e.stopPropagation()}>
        <PlusIcon />
      </button>
    </div>
  );
}

/* ── Footer with magnetic CTA ────────────────────────────────────────────── */
function Footer() {
  const { t } = useT();
  const [time, setTime] = useState('');
  const btnRef = useRef(null);

  useEffect(() => {
    const tick = () => setTime(
      new Date().toLocaleTimeString('en-GB', { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', second: '2-digit' })
    );
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  /* magnetic CTA */
  useEffect(() => {
    const btn = btnRef.current;
    if (!btn) return;
    let xTo, yTo, cleanup = () => {};

    const mm = gsap.matchMedia();
    mm.add('(prefers-reduced-motion: no-preference)', () => {
      xTo = gsap.quickTo(btn, 'x', { duration: 0.5, ease: 'power3.out' });
      yTo = gsap.quickTo(btn, 'y', { duration: 0.5, ease: 'power3.out' });

      const RADIUS = 90;
      const onMove = (e) => {
        const r = btn.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top  + r.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const dist = Math.hypot(dx, dy);
        if (dist < RADIUS) {
          xTo(dx * 0.4);
          yTo(dy * 0.4);
        } else {
          xTo(0); yTo(0);
        }
      };
      const onLeave = () => { xTo(0); yTo(0); };

      window.addEventListener('mousemove', onMove);
      btn.addEventListener('mouseleave', onLeave);
      cleanup = () => {
        window.removeEventListener('mousemove', onMove);
        btn.removeEventListener('mouseleave', onLeave);
        gsap.set(btn, { x: 0, y: 0 });
      };
    });

    return () => { mm.revert(); cleanup(); };
  }, []);

  return (
    <footer className="footer" id="contact">
      <div className="footer-inner">
        <div className="gf">
          <span className="t-label t-label-dark" style={{ marginBottom: 24, display: 'block' }}>{t('footer.eyebrow')}</span>

            {t('footer.sub')}
          </p>
          <div className="footer-cta">
            <a ref={btnRef} className="btn btn-primary" href="mailto:ricardomartinezing1@gmail.com"
               style={{ display: 'inline-flex', willChange: 'transform' }}>

        <div className="footer-grid gf">
          <div>

            <p style={{ font: '400 13px var(--font-sans)', color: 'rgba(245,245,240,.5)', margin: 0 }}>{t('footer.remote')}</p>
          </div>
          <div>

/* ── Project modal ───────────────────────────────────────────────────────── */
function Modal({ project, index, onClose }) {
  const { t } = useT();
  const i18n = t('sideProjects.' + project.id) || {};
  const overlayRef = useRef(null);
  const boxRef = useRef(null);
  const canvasRef = useRef(null);
  const slideWrapRef = useRef(null);
  const pdfDocRef = useRef(null);
  const renderTaskRef = useRef(null);

  const isEmbed = !!project.slidesEmbed;
  const isPdf   = !isEmbed && !!(project.slidesPdf && window.pdfjsLib);
  const slides  = project.slides || [];
  const [pdfPages, setPdfPages] = useState(0);
  const total   = isPdf ? pdfPages : slides.length;
  const [slide, setSlide] = useState(0);
  const [resizeTick, setResizeTick] = useState(0);

  /* ── Load the PDF once when the modal mounts ── */
  useEffect(() => {
    if (!isPdf) return;
    let cancelled = false;
    (async () => {
      try {
        const pdf = await window.pdfjsLib.getDocument(project.slidesPdf).promise;
        if (cancelled) return;
        pdfDocRef.current = pdf;
        setPdfPages(pdf.numPages);
      } catch (e) {
        console.error('PDF load failed:', e);
      }
    })();
    return () => {
      cancelled = true;
      if (renderTaskRef.current) try { renderTaskRef.current.cancel(); } catch {}
      if (pdfDocRef.current) try { pdfDocRef.current.destroy(); } catch {}
      pdfDocRef.current = null;
    };
  }, [isPdf, project.slidesPdf]);

  /* ── Render the current page whenever it changes / pdf is ready ── */
  useEffect(() => {
    if (!isPdf || !pdfDocRef.current || !canvasRef.current || pdfPages === 0) return;
    let cancelled = false;
    (async () => {
      try {
        const page = await pdfDocRef.current.getPage(slide + 1);
        if (cancelled) return;
        const canvas    = canvasRef.current;
        const wrap      = slideWrapRef.current;
        if (!canvas || !wrap) return;
        const cw = wrap.clientWidth  - 24;   /* padding for breathing room */
        const ch = wrap.clientHeight - 24;
        const base = page.getViewport({ scale: 1 });
        const fit  = Math.min(cw / base.width, ch / base.height);
        const dpr  = window.devicePixelRatio || 1;
        const vp   = page.getViewport({ scale: fit * dpr });
        canvas.width  = vp.width;
        canvas.height = vp.height;
        canvas.style.width  = (vp.width  / dpr) + 'px';
        canvas.style.height = (vp.height / dpr) + 'px';
        if (renderTaskRef.current) try { renderTaskRef.current.cancel(); } catch {}
        const task = page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
        renderTaskRef.current = task;
        await task.promise;
      } catch (e) {
        if (e && e.name !== 'RenderingCancelledException') console.error(e);
      }
    })();
    return () => { cancelled = true; };
  }, [isPdf, slide, pdfPages, resizeTick]);

  /* Re-render PDF page on window resize (debounced) */
  useEffect(() => {
    if (!isPdf) return;
    let t;
    const onResize = () => { clearTimeout(t); t = setTimeout(() => setResizeTick(n => n + 1), 200); };
    window.addEventListener('resize', onResize);
    return () => { window.removeEventListener('resize', onResize); clearTimeout(t); };
  }, [isPdf]);

  /* ── Uncovering modal animation (smoothed variant) ──
     The modal slides up from below the viewport while the backdrop fades in.
     Longer duration + expo.out for a more gliding feel.                    */
  const EASE_IN  = 'expo.out';   /* slow finish — feels gliding */
  const EASE_OUT = 'expo.in';    /* mirrors entry, accelerates out */

  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      gsap.set(overlayRef.current, { autoAlpha: 0 });
      gsap.set(boxRef.current,     { yPercent: 100 });
      const tl = gsap.timeline();
      tl.to(overlayRef.current, { autoAlpha: 1, duration: 0.7, ease: 'power2.out' }, 0);
      tl.to(boxRef.current,     { yPercent: 0,  duration: 0.9, ease: EASE_IN     }, 0);
    });
    return () => ctx.revert();
  }, []);

  const close = useCallback(() => {
    const tl = gsap.timeline({ onComplete: onClose });
    tl.to(boxRef.current,     { yPercent: 100, duration: 0.75, ease: EASE_OUT     }, 0);
    tl.to(overlayRef.current, { autoAlpha: 0,  duration: 0.6,  ease: 'power2.in'  }, 0.1);
  }, [onClose]);

  const next = useCallback(() => setSlide(s => Math.min(s + 1, Math.max(total - 1, 0))), [total]);
  const prev = useCallback(() => setSlide(s => Math.max(s - 1, 0)), []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape')          close();
      else if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft')  prev();
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [close, next, prev]);

  const renderSlide = (s) => {
    if (!s) return null;
    if (typeof s === 'string') {
      return /\.(mp4|webm|ogg)$/i.test(s)
        ? <video src={s} autoPlay loop muted playsInline />
        : <img src={s} alt="" />;
    }
    if (s.src) return /\.(mp4|webm|ogg)$/i.test(s.src)
      ? <video src={s.src} autoPlay loop muted playsInline />
      : <img src={s.src} alt={s.caption || ''} />;
    return s;
  };

  const idxLabel = String(index || 1).padStart(2, '0');
  const cur = String(total === 0 ? 1 : slide + 1).padStart(2, '0');
  const tot = String(total).padStart(2, '0');

  /* Portalled to <body> so position:fixed escapes #smooth-content's
     transform context — otherwise the overlay gets scoped to the
     transformed wrapper instead of the viewport.                       */
  return ReactDOM.createPortal((
    <div ref={overlayRef} className="sp-modal-overlay" onClick={close}>
      <div ref={boxRef} className="sp-modal-box" onClick={e => e.stopPropagation()}>

        {/* ── Header ── */}
        <div className="sp-modal-header">
          <div className="sp-modal-header-top">
            <div className="sp-modal-meta">
              <span className="sp-modal-dot" />
              {i18n.meta || project.meta || 'Side project'} · {project.year || '—'}
            </div>
            <div className="sp-modal-actions">
              <a className="btn btn-primary btn-sm" href="mailto:ricardomartinezing1@gmail.com">
                {t('getInTouch')} <ArrowRight />
              </a>
              <button className="sp-modal-close" onClick={close} aria-label="Close">
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
                  <line x1="2" y1="2" x2="12" y2="12" />
                  <line x1="12" y1="2" x2="2" y2="12" />
                </svg>
              </button>
            </div>
          </div>
          <h2 className="sp-modal-title">
            {(i18n.modalTitleKeyword || project.modalTitleKeyword)
              ? <>{(i18n.modalTitleRest || project.modalTitleRest) ? (i18n.modalTitleRest || project.modalTitleRest) + ' ' : ''}<em style={{ fontFamily: 'var(--font-serif)', fontWeight: 300, fontStyle: 'italic', color: 'var(--color-forest)' }}>{i18n.modalTitleKeyword || project.modalTitleKeyword}</em></>
              : <>{project.name}{(i18n.title || project.title) ? ' — ' + (i18n.title || project.title) : ''}</>}
          </h2>
          <p className="sp-modal-desc">{i18n.modalDesc || project.modalDesc || project.details || i18n.desc || project.desc}</p>
        </div>

        {/* ── Body / carousel ── */}
        <div className={`sp-modal-body${isEmbed ? ' is-embed' : ''}`}>
          {!isEmbed && (
            <button className="sp-modal-nav prev" onClick={prev} disabled={total === 0 || slide === 0} aria-label="Previous slide">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M10 3 L4 8 L10 13" />
              </svg>
            </button>
          )}
          <div ref={slideWrapRef} className="sp-modal-slide">
            {isEmbed
              ? <iframe
                  src={project.slidesEmbed}
                  className="sp-modal-iframe"
                  title={project.name}
                  allowFullScreen
                  allow="fullscreen; clipboard-read; clipboard-write"
                />
              : isPdf
                ? (pdfPages === 0
                    ? <span className="sp-modal-empty">{t('loadingPdf')}</span>
                    : <canvas ref={canvasRef} />)
                : (total === 0
                    ? <span className="sp-modal-empty">{t('noSlides')}</span>
                    : renderSlide(slides[slide]))}
          </div>
          {!isEmbed && (
            <button className="sp-modal-nav next" onClick={next} disabled={total === 0 || slide >= total - 1} aria-label="Next slide">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 3 L12 8 L6 13" />
              </svg>
            </button>
          )}
        </div>

        {/* ── Footer ── */}
        <div className="sp-modal-footer">
          {isEmbed
            ? <span className="keys" style={{ width: '100%', textAlign: 'center' }}>{t('embedHint')}</span>
            : <>
                <span>{cur} / {tot}</span>
                <span className="keys">{t('keysHint')}</span>
              </>}
        </div>

      </div>
    </div>
  ), document.body);
}

/* ── Cursor dot — 8px lima dot that lags slightly behind the pointer ─── */
function CursorDot() {
  const dotRef = useRef(null);

  useLayoutEffect(() => {
    const dot = dotRef.current;
    if (!dot) return;
    /* Skip on touch devices (no pointer to follow) */
    if (window.matchMedia('(pointer: coarse)').matches) return;

    const xTo = gsap.quickTo(dot, 'x', { duration: 0.35, ease: 'power3' });
    const yTo = gsap.quickTo(dot, 'y', { duration: 0.35, ease: 'power3' });

    const onMove = (e) => { xTo(e.clientX); yTo(e.clientY); };
    const onLeave = () => gsap.to(dot, { autoAlpha: 0, duration: 0.2 });
    const onEnter = () => gsap.to(dot, { autoAlpha: 1, duration: 0.2 });

    window.addEventListener('mousemove', onMove);
    document.addEventListener('mouseleave', onLeave);
    document.addEventListener('mouseenter', onEnter);
    return () => {
      window.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseleave', onLeave);
      document.removeEventListener('mouseenter', onEnter);
    };
  }, []);

  /* Portalled to <body> so it escapes #smooth-content's transform context —
     otherwise position:fixed would be scoped to the scrolled wrapper.     */
  return ReactDOM.createPortal(
    <div ref={dotRef} className="cursor-dot" aria-hidden="true" />,
    document.body
  );
}

function App() {
  const [active, setActive]       = useState(null);
  const [openProject, setOpenProject] = useState(null);

  /* Global scroll-reveal setup */
  useLayoutEffect(() => {
    const mm = gsap.matchMedia();
    mm.add('(prefers-reduced-motion: no-preference)', () => {
      /* initial state for all scroll-triggered elements */
      gsap.set('.gf', { autoAlpha: 0, y: 28 });

      /* standard batch: sections, cards, quotes, footer blocks */
      ScrollTrigger.batch('.gf', {
        onEnter: (els) => gsap.to(els, { autoAlpha: 1, y: 0, stagger: 0.08, duration: 0.7, ease: 'power2.out', clearProps: 'transform' }),
        once: true,
        start: 'top 88%',
      });

      /* refresh after fonts are loaded so trigger positions are correct */
      document.fonts.ready.then(() => {
        ScrollTrigger.refresh();
        if (window._syncBodyHeight) window._syncBodyHeight();
      });
    });
    return () => mm.revert();
  }, []);

  /* Flip-board text-hover animation — applied to every CTA, menu item, .btn
     and link-arrow in the page. SplitType is run once per element; gsap.from
     is fired on the nearest interactive ancestor's mouseenter.

     SplitType only wraps text nodes, so SVG icons / arrow circles inside the
     same button are NOT in split.chars and remain untouched. */
  useEffect(() => {
    if (typeof SplitType === 'undefined' || !document.body) return;
    const SELECTORS = [
      '.btn',          // primary / ghost / small variants
      '.nav-item',     // menu items
      '.nav-cta',      // "Let's talk" pill
      '.la-text',      // link-arrow text  (inside .la)
    ].join(',');

    const cleanups = [];

    document.querySelectorAll(SELECTORS).forEach((trigger) => {
      // Pick the smallest text-only target so SplitType never touches
      // sibling icons / arrow circles. Three cases:
      //   a) trigger has a text-only child element (e.g. nav-cta's
      //      "Let's talk" span)  →  split that child
      //   b) trigger is a flex/grid container with column gap AND has a
      //      direct text node child (e.g. .btn "Let's talk") → wrap the
      //      text node in a span so chars stay nested (gap won't push
      //      them apart) and split that wrap
      //   c) otherwise split the trigger directly
      let target = trigger;
      const textOnlyChild = Array.from(trigger.children).find(
        (c) => c.children.length === 0 && c.textContent.trim()
      );
      if (textOnlyChild) {
        target = textOnlyChild;
      } else {
        const cs = window.getComputedStyle(trigger);
        const flexish = cs.display.includes('flex') || cs.display.includes('grid');
        const colGap = parseFloat(cs.columnGap || '0') || parseFloat(cs.gap || '0') || 0;
        if (flexish && colGap > 0) {
          const textNode = Array.from(trigger.childNodes)
            .find((n) => n.nodeType === Node.TEXT_NODE && n.textContent.trim());
          if (textNode) {
            const wrap = document.createElement('span');
            wrap.className = 'flip-text-wrap';
            wrap.style.display = 'inline-block';
            trigger.insertBefore(wrap, textNode);
            wrap.appendChild(textNode);
            target = wrap;
          }
        }
      }

      if (!target.textContent.trim()) return;

      let split;
      try { split = new SplitType(target, { types: 'chars' }); }
      catch (e) { return; }
      const chars = split.chars;
      if (!chars || !chars.length) return;

      gsap.set(chars, { display: 'inline-block', backfaceVisibility: 'hidden' });

      // Hover trigger: prefer .la wrapper for .la-text, else the element itself.
      const hoverEl = trigger.classList.contains('la-text')
        ? (trigger.closest('.la') || trigger)
        : trigger;

      const onEnter = () => {
        gsap.from(chars, {
          rotationX: -90,
          transformOrigin: '50% 0%',
          opacity: 0,
          stagger: { each: 0.04, from: 'start' },
          duration: 0.5,
          ease: 'power2.out',
          overwrite: true,
        });
      };
      hoverEl.addEventListener('mouseenter', onEnter);
      cleanups.push(() => {
        hoverEl.removeEventListener('mouseenter', onEnter);
        if (split.revert) split.revert();
      });
    });

    return () => cleanups.forEach((fn) => fn());
  }, []);

  /* Active nav-item follows the section in view. Triggers on each section's
     mid-viewport crossing so hero stays "none active" until Work scrolls in. */
  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      const watch = (id, label) => {
        const el = document.getElementById(id);
        if (!el) return;
        ScrollTrigger.create({
          trigger: el,
          start:   'top 55%',
          end:     'bottom 45%',
          onToggle: (self) => { if (self.isActive) setActive(label); },
          onLeave:     () => setActive(null),
          onLeaveBack: () => setActive(null),
        });
      };
      watch('work',  'Work');
      watch('about', 'About');
    });
    return () => ctx.revert();
  }, []);

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (window.smoothScrollTo) {
      const content = document.getElementById('smooth-content');
      const offsetTop = el.getBoundingClientRect().top - content.getBoundingClientRect().top;
      window.smoothScrollTo(offsetTop);
    } else {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  return (
    <>
      <CursorDot />
      <Nav active={active} onNavigate={setActive} onCta={() => scrollTo('contact')} />
      <Hero onPrimary={() => scrollTo('contact')} onGhost={() => { setActive('Work'); scrollTo('work'); }} />
      <SideShowcaseSection />
      <WorkSection onOpen={setOpenProject} />
      <AboutSection />
      <BackgroundSection />
      <Footer />
      {openProject && (
        <Modal
          project={openProject}
          index={SIDE_PROJECTS.findIndex(p => p.id === openProject.id) + 1}
          onClose={() => setOpenProject(null)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <LanguageProvider>
    <App />
  </LanguageProvider>
);
</script>
</body>
</html>
